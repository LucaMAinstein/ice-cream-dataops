workflowExternalId: wf_icapi_data_pipeline
version: '1'
workflowDefinition:
  description: 'Run ICAPI pipeline tasks in sequence'
  tasks:
    - externalId: 'wf_icapi_data_pipeline_icapi_datapoints_extractor'
      type: 'function'
      parameters:
        function:
          externalId: 'icapi_datapoints_extractor'
          data: {}
        isAsyncComplete: false
      name: 'Extract DataPoints'
      description: 'Extract DataPoints data from the Ice Cream API'
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'

    - externalId: 'wf_icapi_data_pipeline_create_asset_hierarchy'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'create_asset_hierarchy'
          concurrencyPolicy: 'fail'
      name: 'Create Asset Hierarchy'
      description: 'Create Cognite Asset hierarchy'
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'
      dependsOn:
        - externalId: 'wf_icapi_data_pipeline_icapi_datapoints_extractor'

    - externalId: 'wf_icapi_data_pipeline_contextualize_ts_assets'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'contextualize_ts_assets'
          concurrencyPolicy: 'fail'
      name: 'Contextualize TimeSeries and Assets'
      description: 'Link TimeSeries to Assets'
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_icapi_data_pipeline_create_asset_hierarchy'